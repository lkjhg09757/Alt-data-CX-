<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CreditX Login</title>
  <style>
    :root { --ink:#18212f; --muted:#687386; --line:#d8e0ea; --soft:#f5f7fa; --blue:#2457d6; --red:#c43b3b; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Inter, Arial, sans-serif;
      color: var(--ink);
      background: #edf1f6;
    }
    .login {
      width: min(390px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(16,24,40,.10);
    }
    .logo { display:block; width: 170px; height:auto; margin-bottom: 24px; }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .sub { margin: 0 0 22px; color: var(--muted); font-size: 13px; line-height: 1.4; }
    label { display:block; margin: 12px 0 6px; font-size: 12px; font-weight: 750; }
    input {
      width: 100%;
      min-height: 38px;
      border: 1px solid #c9d3e1;
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--ink);
      background: #fff;
    }
    button {
      width: 100%;
      min-height: 40px;
      margin-top: 18px;
      border: 1px solid var(--blue);
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    .error {
      display: none;
      margin-top: 12px;
      color: var(--red);
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>

    <h1>Alternate Data POC</h1>
    <p class="sub">Use a CreditX email ID and passcode to continue.</p>
    <form id="loginForm">
      <label>Email ID</label>
      <input id="email" type="email" autocomplete="username" placeholder="name@creditx.co.in" required />
      <label>Passcode</label>
      <input id="passcode" type="password" autocomplete="current-password" inputmode="numeric" required />
      <button type="submit">Login</button>
      <div id="error" class="error">Use an email ending with @creditx.co.in and passcode 9192.</div>
    </form>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', event => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const passcode = document.getElementById('passcode').value.trim();
      if (email.endsWith('@creditx.co.in') && passcode === '9192') {
        sessionStorage.setItem('creditxAuth', 'ok');
        window.location.href = 'creditx_alternate_data_poc.html';
        return;
      }
      document.getElementById('error').style.display = 'block';
    });
  </script>
</body>
</html>
